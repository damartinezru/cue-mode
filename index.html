<script>
    // Hamburger Menu Logic
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const closeMenuBtn = document.getElementById('close-menu-btn');
    const menuOverlay = document.getElementById('mobile-menu-overlay');

    hamburgerBtn.addEventListener('click', () => {
        menuOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    });

    closeMenuBtn.addEventListener('click', () => {
        menuOverlay.classList.remove('active');
        document.body.style.overflow = '';
    });

    // Coming Soon Logic
    function showComingSoon(imageId) {
        const modal = document.getElementById('coming-soon-modal');
        const image = document.getElementById(imageId);
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        image.classList.remove('hidden');

        // If coming from mobile menu, close it
        menuOverlay.classList.remove('active');
    }

    function hideComingSoon() {
        const modal = document.getElementById('coming-soon-modal');
        const image = document.getElementById('coming-soon-modal').querySelector('img:not(.hidden)');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        image.classList.add('hidden');
        document.body.style.overflow = '';
    }

// Video Player Logic Integration
    const videoElement = document.getElementById('sonic-video-player');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const playIcon = document.getElementById('play-icon');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    // Video Asset Array (Placeholders)
    const playlist = [
        'assets/music/song3.mp4', // USER_ACTION: Replace with actual video URL 1
        'assets/music/song2.mp4', // USER_ACTION: Replace with actual video URL 2
        'assets/music/song1.mp4'  // USER_ACTION: Replace with actual video URL 3
    ];
    let currentIndex = 0;
    let isPlaying = true; // Initialized to true for autoplay

    function updateVideoSource() {
        console.log("Updating video source to: ", playlist[currentIndex]);
        videoElement.src = playlist[currentIndex];
        videoElement.load();
        if (isPlaying) {
            videoElement.play().catch(err => {
                console.log("Autoplay blocked: ", err);
                isPlaying = false;
                playIcon.textContent = 'play_arrow';
                playPauseBtn.classList.remove('active-pulse');
            });
        }
    }

    function togglePlay() {
        if (videoElement.paused || videoElement.ended) {
            if (!videoElement.src || videoElement.src.includes('undefined')) {
                updateVideoSource();
            }
            videoElement.play()
                .then(() => {
                    isPlaying = true;
                    playIcon.textContent = 'pause';
                    playPauseBtn.classList.add('active-pulse');
                })
                .catch(err => console.log("Play failed: ", err));
        } else {
            videoElement.pause();
            isPlaying = false;
            playIcon.textContent = 'play_arrow';
            playPauseBtn.classList.remove('active-pulse');
        }
    }

    function nextTrack() {
        currentIndex = (currentIndex + 1) % playlist.length;
        updateVideoSource();
    }

    function prevTrack() {
        currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
        updateVideoSource();
    }

    playPauseBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);

    // Micro-interaction for Liquid-press effect
    document.querySelectorAll('button, a').forEach(el => {
        el.addEventListener('mousedown', () => {
            el.classList.add('scale-95');
        });
        el.addEventListener('mouseup', () => {
            el.classList.remove('scale-95');
        });
        el.addEventListener('mouseleave', () => {
            el.classList.remove('scale-95');
        });
    });

    // Simple animation trigger for hero
    window.addEventListener('load', () => {
        const h1 = document.querySelector('h1');
        updateVideoSource();
        const mainContent = document.querySelector('main div');
        if(mainContent) {
            mainContent.style.animation = 'fadeInUp 1s ease-out forwards';
        }
        if(h1) {
            h1.classList.remove('translate-y-10', 'opacity-0');
        }
    });
</script>
